<script>
// ===========================================
// 作成ハブ（AI生成 / 検索 / 下書き）
// ===========================================

App.renderCreateContent = function() {
  var tab = this.state.createTab || 'ai';
  return '<div>' +
    '<div style="padding:16px 16px 0;">' +
      '<div class="subtabs" data-group="create" role="tablist" aria-label="作成タブ">' +
        '<button class="subtab' + (tab === 'ai' ? ' active' : '') + '" data-group="create" data-tab="ai" role="tab" aria-controls="create-tab-ai">AI生成</button>' +
        '<button class="subtab' + (tab === 'search' ? ' active' : '') + '" data-group="create" data-tab="search" role="tab" aria-controls="create-tab-search">検索</button>' +
        '<button class="subtab' + (tab === 'drafts' ? ' active' : '') + '" data-group="create" data-tab="drafts" role="tab" aria-controls="create-tab-drafts">下書き</button>' +
      '</div>' +
    '</div>' +
    '<div class="subtab-panels">' +
      '<div id="create-tab-ai" role="tabpanel" class="subtab-panel' + (tab === 'ai' ? ' active' : '') + '">' +
        this.renderGenerateContent() +
      '</div>' +
      '<div id="create-tab-search" role="tabpanel" class="subtab-panel' + (tab === 'search' ? ' active' : '') + '">' +
      '</div>' +
      '<div id="create-tab-drafts" role="tabpanel" class="subtab-panel' + (tab === 'drafts' ? ' active' : '') + '">' +
      '</div>' +
    '</div>' +
  '</div>';
};

App.loadCreate = function() {
  var self = this;
  var saved = localStorage.getItem('insight_master_subtab_create');
  var tab = saved || this.state.createTab || 'ai';
  document.querySelectorAll('.subtab[data-group="create"]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      self.switchCreateTab_(this.getAttribute('data-tab'));
    });
  });
  this.switchCreateTab_(tab, true);
  this.bindGenerateEvents();
};

App.switchCreateTab_ = function(tab, silent) {
  this.state.createTab = tab;
  localStorage.setItem('insight_master_subtab_create', tab);
  document.querySelectorAll('.subtab[data-group="create"]').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-tab') === tab);
  });
  var panels = ['ai','search','drafts'];
  panels.forEach(function(t) {
    var el = document.getElementById('create-tab-' + t);
    if (el) el.classList.toggle('active', t === tab);
  });
  if (tab === 'search') {
    var searchPanel = document.getElementById('create-tab-search');
    if (searchPanel && searchPanel.innerHTML.trim() === '') {
      searchPanel.innerHTML = this.renderKeywordsContent();
      if (this.loadKeywords) this.loadKeywords();
    }
  }
  if (tab === 'drafts') {
    var draftsPanel = document.getElementById('create-tab-drafts');
    if (draftsPanel && draftsPanel.innerHTML.trim() === '') {
      draftsPanel.innerHTML = this.renderDraftsContent();
      if (this.loadDrafts) this.loadDrafts();
    }
  }
  if (!silent) {
    this.bindTipsEvents();
  }
};

// ===========================================
// AI投稿生成（分析ベース対応版）
// ===========================================

App.renderGenerateContent = function() {
  var hasKey = !!(this.state.settings && this.state.settings.hasGeminiKey);
  var savedSettings = null;
  try { savedSettings = JSON.parse(localStorage.getItem('insight_master_ai_settings') || 'null'); } catch (e) {}
  var savedTheme = savedSettings && savedSettings.theme ? savedSettings.theme : '';
  var savedMode = savedSettings && savedSettings.mode ? savedSettings.mode : 'normal';
  var keyWarning = '';
  if (!hasKey) {
    keyWarning = '<div class="card warning-banner mb-12">' +
      '<div class="flex-row gap-8 mb-8"><span class="icon-lg">⚠️</span><span class="text-subheading">AI機能を使うにはGemini APIキーが必要です</span></div>' +
      '<button id="goGeminiSettingsBtn" class="btn btn-secondary btn-small">設定画面へ</button>' +
      '</div>';
  }

   return '<div class="screen-content">' +
    this.renderTips([
      { title: '📝 通常モード', body: '自由なテーマで複数パターンの投稿文を生成。「朝活」「副業」「AI」などキーワードを入れるだけでOK。具体的なほど良い投稿が出ます。' },
      { title: '🧵 ツリーモード', body: '親投稿＋返信2〜3本のツリー構成を自動生成。ストーリー性のある長文コンテンツに最適。Threadsのアルゴリズムはツリー投稿を優遇する傾向があります。' },
      { title: '📊 分析ベースモード（おすすめ）', body: 'ダッシュボードの実データ（高ER投稿・ゴールデンタイム・フォロワー属性）をAIに自動で渡して生成。データに基づいた提案なので再現性が高いです。' },
      { title: '💡 良いテーマの書き方', body: '❌「仕事」→ 広すぎる<br>✅「リモートワークで集中力を保つコツ」→ 具体的<br>✅「30代会社員が副業で月3万円稼ぐまで」→ ターゲット明確<br>テーマが具体的なほどAIの出力も的確になります。' }
    ]) +
    '<div class="card"><div class="card-title">AI投稿生成</div>' +
      keyWarning +
      '<div class="mb-12"><label class="form-label">テーマ・トピック</label>' +
        '<input type="text" id="aiThemeInput" class="input" placeholder="例: 朝活のメリット、AI時代の働き方" value="' + this.escapeAttr(savedTheme) + '"></div>' +
      '<div class="mb-16"><label class="form-label">生成モード</label>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
          '<button class="btn btn-small gen-mode-btn' + (savedMode === 'normal' ? ' active' : '') + '" data-mode="normal" role="radio" aria-checked="true">📝 通常</button>' +
          '<button class="btn btn-small gen-mode-btn' + (savedMode === 'thread' ? ' active' : '') + '" data-mode="thread" role="radio" aria-checked="false">🧵 ツリー</button>' +
          '<button class="btn btn-small gen-mode-btn' + (savedMode === 'analysis-based' ? ' active' : '') + '" data-mode="analysis-based" role="radio" aria-checked="false">📊 分析ベース</button></div>' +
        '<p class="form-label-small mt-8" id="modeDesc">テーマに沿った3〜5パターンの投稿文を生成</p></div>' +
      '<div id="angleWrap" class="mb-16" style="display:none;"><label class="form-label">切り口（スレッド・分析ベース用）</label>' +
        '<div style="display:flex;gap:6px;flex-wrap:wrap;">' +
          '<button class="btn btn-small angle-btn active" data-angle="" style="font-size:12px;">🎯 自動</button>' +
          '<button class="btn btn-small angle-btn" data-angle="tools" style="font-size:12px;">🔧 ツール紹介</button>' +
          '<button class="btn btn-small angle-btn" data-angle="howto" style="font-size:12px;">📝 やり方・手順</button>' +
          '<button class="btn btn-small angle-btn" data-angle="mistakes" style="font-size:12px;">💥 失敗談</button>' +
          '<button class="btn btn-small angle-btn" data-angle="comparison" style="font-size:12px;">⚖️ 比較</button>' +
          '<button class="btn btn-small angle-btn" data-angle="case" style="font-size:12px;">📊 事例</button>' +
          '<button class="btn btn-small angle-btn" data-angle="beginner" style="font-size:12px;">🔰 初心者向け</button>' +
        '</div></div>' +
      '<div id="analysisPreview" style="display:none;"></div>' +
      '<button id="generateBtn" class="btn btn-primary btn-full" ' + (hasKey ? '' : 'disabled') + '>✨ 生成する</button>' +
    '</div>' +
    '<div id="generateResults"></div></div>';
};

App.bindGenerateEvents = function() {
  var self = this;
  var goGeminiSettingsBtn = document.getElementById('goGeminiSettingsBtn');
  if (goGeminiSettingsBtn) {
    goGeminiSettingsBtn.addEventListener('click', function() {
      self.showScreen('settings');
    });
  }

  var selectedMode = 'normal';
  var activeBtn = document.querySelector('.gen-mode-btn.active');
  if (activeBtn) selectedMode = activeBtn.getAttribute('data-mode') || 'normal';
  var modeDescs = {
    'normal': 'テーマに沿った3〜5パターンの投稿文を生成',
    'thread': '親投稿＋返信2〜3本のツリー投稿セットを生成',
    'analysis-based': '📊 あなたの分析データ（高ER投稿・ゴールデンタイム・フォロワー属性）を元に投稿案を生成'
  };

  document.querySelectorAll('.gen-mode-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.gen-mode-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      selectedMode = this.getAttribute('data-mode');
      var desc = document.getElementById('modeDesc');
      if (desc) desc.textContent = modeDescs[selectedMode] || '';

      // 切り口セレクタの表示制御
      var angleWrap = document.getElementById('angleWrap');
      if (angleWrap) {
        angleWrap.style.display = (selectedMode === 'thread' || selectedMode === 'analysis-based') ? 'block' : 'none';
      }

      // 分析ベース選択時にプレビュー表示
      var preview = document.getElementById('analysisPreview');
      if (selectedMode === 'analysis-based') {
        self.loadAnalysisPreview_();
      } else if (preview) {
        preview.style.display = 'none';
      }
    });
  });

  var genBtn = document.getElementById('generateBtn');
  if (genBtn) genBtn.addEventListener('click', async function() {
    var theme = document.getElementById('aiThemeInput').value.trim();
    if (!theme) { self.showToast('テーマを入力してください', 'error'); return; }
    localStorage.setItem('insight_master_ai_settings', JSON.stringify({ theme: theme, mode: selectedMode, tone: '' }));
    genBtn.disabled = true;
    genBtn.textContent = selectedMode === 'analysis-based' 
      ? '📊 分析データ収集＋生成中（15〜45秒）...' 
      : '生成中（10〜30秒）...';

    try {
      var action = selectedMode === 'analysis-based' ? 'generatePostWithAnalysis' : 'generatePostWithAI';
      var result = await self.api(action, { theme: theme, mode: selectedMode, count: 3, angle: selectedAngle || '' });
      self.renderGenerateResults_(result);
    } catch (e) { self.showToast('生成エラー: ' + e.message, 'error'); }
    genBtn.disabled = false; genBtn.textContent = '✨ 生成する';
  });

  // 切り口セレクタのイベント
  var selectedAngle = '';
  document.querySelectorAll('.angle-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.angle-btn').forEach(function(b) {
        b.classList.remove('active');
        b.style.background = '';
        b.style.color = '';
      });
      this.classList.add('active');
      this.style.background = 'var(--primary)';
      this.style.color = '#fff';
      selectedAngle = this.getAttribute('data-angle');
    });
  });
  // 初期状態: 自動ボタンをアクティブに
  var defaultAngle = document.querySelector('.angle-btn[data-angle=""]');
  if (defaultAngle) { defaultAngle.style.background = 'var(--primary)'; defaultAngle.style.color = '#fff'; }

  // 初期表示: モードに応じてangleWrapを制御
  var angleWrapInit = document.getElementById('angleWrap');
  if (angleWrapInit) {
    angleWrapInit.style.display = (selectedMode === 'thread' || selectedMode === 'analysis-based') ? 'block' : 'none';
  }
};

// 分析ベースモード選択時のプレビュー読み込み
App.loadAnalysisPreview_ = function() {
  var self = this;
  var preview = document.getElementById('analysisPreview');
  if (!preview) return;

  preview.style.display = 'block';
  preview.innerHTML = '<div class="warning-banner info-banner">' +
    '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;"><span>📊</span><strong>分析データを読み込み中...</strong></div>' +
    '<div class="loading-spinner" style="width:20px;height:20px;margin:0 auto;"></div></div>';

  this.api('getAnalyticsData', { periodDays: 30 }).then(function(data) {
    var summary = data.summary || {};
    var posts = data.posts || [];
    var topPosts = posts
      .filter(function(p) { return p.engagementRate > 0; })
      .sort(function(a, b) { return b.engagementRate - a.engagementRate; })
      .slice(0, 3);

    var html = '<div class="warning-banner info-banner">';
    html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;"><span>📊</span><strong>あなたの分析データ（生成に使用）</strong></div>';
    
    html += '<div class="grid-3 mb-8">';
    html += '<div style="background:var(--surface);padding:8px;border-radius:6px;text-align:center;">';
    html += '<div class="form-label-small">投稿数</div><div style="font-weight:700;">' + (summary.totalPosts || 0) + '</div></div>';
    html += '<div style="background:var(--surface);padding:8px;border-radius:6px;text-align:center;">';
    html += '<div class="form-label-small">平均ER</div><div style="font-weight:700;">' + (summary.avgEngagementRate || 0) + '%</div></div>';
    html += '<div style="background:var(--surface);padding:8px;border-radius:6px;text-align:center;">';
    html += '<div class="form-label-small">総ビュー</div><div style="font-weight:700;">' + (summary.totalViews || 0).toLocaleString() + '</div></div>';
    html += '</div>';

    if (topPosts.length > 0) {
      html += '<div style="font-size:12px;font-weight:600;margin-bottom:6px;">🏆 高ER投稿TOP' + topPosts.length + '</div>';
      topPosts.forEach(function(p, i) {
        var text = (p.text || '').substring(0, 60);
        html += '<div style="background:var(--surface);padding:6px 8px;border-radius:4px;margin-bottom:4px;font-size:11px;">';
        html += '<span style="color:var(--success);font-weight:700;">ER ' + p.engagementRate.toFixed(1) + '%</span> ';
        html += self.escapeHtml(text) + (p.text && p.text.length > 60 ? '…' : '');
        html += '</div>';
      });
    }

    if (summary.totalPosts === 0) {
      html += '<div style="color:var(--warning-text);margin-top:6px;">⚠️ 投稿データがまだありません。先にダッシュボードで「更新」を実行してデータを取得してください。</div>';
    }

    html += '</div>';
    preview.innerHTML = html;
  }).catch(function() {
    preview.innerHTML = '<div class="warning-banner warning-banner-yellow">' +
      '⚠️ 分析データの取得に失敗しました。通常モードで生成されます。</div>';
  });
};

App.renderGenerateResults_ = function(result) {
  var self = this;
  var c = document.getElementById('generateResults');
  if (!result || !result.results || result.results.length === 0) {
    c.innerHTML = '<div class="card" style="text-align:center;color:var(--text-secondary);">生成結果がありません</div>'; return;
  }

  var html = '';

  // 分析ベースモードの場合、使用データサマリーを表示
  if (result.analysisUsed) {
    var au = result.analysisUsed;
    html += '<div class="card" style="background:linear-gradient(135deg,var(--info-bg),var(--panel-bg));border:1px solid var(--info-border);">';
    html += '<div style="font-size:13px;font-weight:600;margin-bottom:6px;">📊 分析データに基づいて生成しました</div>';
    html += '<div style="font-size:12px;color:var(--text-secondary);display:flex;flex-wrap:wrap;gap:8px;">';
    html += '<span>📝 ' + au.totalPosts + '投稿分析</span>';
    html += '<span>📈 平均ER ' + au.avgER + '%</span>';
    html += '<span>🏆 TOP' + au.topPostCount + '参考</span>';
    html += au.hasTimeData ? '<span>⏰ 時間帯分析 ✅</span>' : '<span>⏰ 時間帯 ❌</span>';
    html += au.hasDemographics ? '<span>👥 属性データ ✅</span>' : '<span>👥 属性 ❌</span>';
    html += '</div></div>';
  }

  result.results.forEach(function(item, idx) {
    var replies = item.replies || [];
    var isThread = (result.mode === 'thread' && (item.parent || replies.length > 0));
    var parentText = item.parent || item.text || '';

    if (isThread) {
      // ツリー投稿
      html += '<div class="card card-relative"><button class="ai-save-btn" data-index="' + idx + '" title="保存">💾</button>';
      html += '<div class="card-title">案' + (idx+1) + ' <span style="font-size:11px;background:var(--success-soft);color:var(--success);padding:2px 8px;border-radius:10px;">🧵 スレッド</span></div>';
      html += '<div style="padding:10px;background:var(--bg-secondary);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--primary);">' +
          '<div style="font-size:14px;line-height:1.6;white-space:pre-wrap;">' + self.escapeHtml(parentText) + '</div></div>';
      replies.forEach(function(reply, ri) {
        html += '<div style="padding:10px;background:var(--bg-secondary);border-radius:8px;margin-bottom:8px;margin-left:16px;font-size:13px;">' +
          '<div style="font-size:11px;color:var(--primary);margin-bottom:4px;font-weight:600;">↳ 返信' + (ri+1) + '</div>' +
          '<div style="line-height:1.6;white-space:pre-wrap;">' + self.escapeHtml(reply) + '</div></div>';
      });
      if (item.reason) {
        html += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;padding:8px;background:var(--bg-tertiary);border-radius:8px;">💡 ' + self.escapeHtml(item.reason) + '</div>';
      }
      // コピー・保存ボタン
      var fullThread = parentText + '\n---\n' + replies.join('\n---\n');
      html += '<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">';
      html += '<button class="btn btn-small btn-secondary copy-gen-btn" data-text="' + self.escapeAttr(fullThread) + '">📋 全文コピー</button>';
      html += '<button class="btn btn-small btn-secondary copy-gen-btn" data-text="' + self.escapeAttr(parentText) + '">📋 親コピー</button>';
      replies.forEach(function(reply, ri) {
        html += '<button class="btn btn-small btn-secondary copy-gen-btn" data-text="' + self.escapeAttr(reply) + '">📋 返信' + (ri+1) + '</button>';
      });
      html += '<button class="btn btn-small btn-primary save-draft-btn">💾 下書き保存</button></div>';
      html += '</div>';
    } else {
      // 通常 or 分析ベース投稿
      var text = item.text || (typeof item === 'string' ? item : JSON.stringify(item));
      html += '<div class="card card-relative"><button class="ai-save-btn" data-index="' + idx + '" title="保存">💾</button>';
      html += '<div style="font-size:14px;margin-bottom:10px;line-height:1.6;white-space:pre-wrap;">' + self.escapeHtml(text) + '</div>';

      // 理由（通常モード）
      if (item.reason) {
        html += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;padding:8px;background:var(--bg-tertiary);border-radius:8px;">💡 ' + self.escapeHtml(item.reason) + '</div>';
      }

      // 分析ベース専用メタ情報
      if (result.mode === 'analysis-based') {
        html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">';
        if (item.expectedER) {
          html += '<span style="font-size:11px;background:var(--success-soft);color:var(--success);padding:2px 8px;border-radius:10px;">📈 予想ER: ' + self.escapeHtml(item.expectedER) + '</span>';
        }
        if (item.bestTime) {
          html += '<span style="font-size:11px;background:var(--info-soft);color:var(--info);padding:2px 8px;border-radius:10px;">⏰ ' + self.escapeHtml(item.bestTime) + '</span>';
        }
        if (item.mediaAdvice) {
          html += '<span style="font-size:11px;background:var(--warning-soft);color:var(--warning-deep);padding:2px 8px;border-radius:10px;">🖼️ ' + self.escapeHtml(item.mediaAdvice) + '</span>';
        }
        html += '</div>';
      }

      html += '<div class="btn-group">' +
        '<button class="btn btn-small btn-secondary copy-gen-btn" data-text="' + self.escapeAttr(text) + '">📋 コピー</button>' +
        '<button class="btn btn-small btn-primary save-draft-btn">すべて保存</button></div></div>';
    }
  });

  c.innerHTML = html;

  // イベントバインド
  c.querySelectorAll('.copy-gen-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { self.copyToClipboard(this.getAttribute('data-text')); });
  });
  c.querySelectorAll('.save-draft-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var drafts = [];
      result.results.forEach(function(item) {
        var reps = item.replies || [];
        var pText = item.parent || item.text || '';
        if (result.mode === 'thread' && (item.parent || reps.length > 0)) {
          var threadText = '【親】' + pText;
          reps.forEach(function(reply, ri) {
            threadText += '\n\n【返信' + (ri+1) + '】' + reply;
          });
          drafts.push({ text: threadText, type: 'thread' });
        } else {
          var t = item.text || item;
          drafts.push({ text: t, type: 'single' });
        }
      });
      Promise.all(drafts.map(function(d) {
        return self.api('saveDraft', { text: d.text, type: d.type, source: 'ai_generated' });
      })).then(function() {
        self.showToast('すべて保存しました', 'success');
      }).catch(function(e) { self.showToast('保存エラー: ' + e.message, 'error'); });
    });
  });

  c.querySelectorAll('.ai-save-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(this.getAttribute('data-index'), 10);
      var item = result.results[idx];
      if (!item) return;
      var reps = item.replies || [];
      var pText = item.parent || item.text || '';
      var isThreadItem = result.mode === 'thread' && (item.parent || reps.length > 0);
      var text = isThreadItem ? (function() {
        var t = '【親】' + pText;
        reps.forEach(function(reply, ri) { t += '\n\n【返信' + (ri+1) + '】' + reply; });
        return t;
      })() : (item.text || item);
      var type = isThreadItem ? 'thread' : 'single';
      var selfBtn = this;
      self.api('saveDraft', { text: text, type: type, source: 'ai_single' }).then(function() {
        selfBtn.textContent = '✅';
        setTimeout(function() { selfBtn.textContent = '💾'; }, 1500);
      }).catch(function(e) { self.showToast('保存エラー: ' + e.message, 'error'); });
    });
  });
};
</script>
